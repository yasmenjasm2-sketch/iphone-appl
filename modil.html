<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🔴 Delt.io - Remas (Multi)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* إضافات مخصصة لمنع التحديد ونسخ الشاشة والمكبر في أجهزة أبل */
        * {
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
        }

        /* استثناء واجهة الاشتراك ليتمكن اللاعب من نسخ رقم جهازه */
        .allow-select {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; overscroll-behavior-y: none;
            overscroll-behavior-x: none; position: fixed;
        }
        
        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; margin: 0; padding: 0; display: block; touch-action: none;
        }

        #game-frame { z-index: 1; pointer-events: auto; transition: opacity 0.3s ease; }
        #fans-frame { z-index: 2; visibility: hidden; opacity: 0; pointer-events: none; transition: opacity 0.4s ease, visibility 0.4s; }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); display: flex;
            justify-content: center; align-items: center; z-index: 99999999;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .welcome-box {
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border: 1px solid #ff4757; border-radius: 16px;
            padding: 30px; width: 95%; max-width: 550px;
            text-align: center; color: #fff;
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.3);
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }

        .welcome-box h1 { margin: 0 0 10px; color: #ff4757; font-size: 26px; }
        .credits { color: #a4b0be; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .credits span { color: #007bff; font-weight: bold; }

        .wallet-section {
            background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 12px;
            padding: 20px; margin-bottom: 25px; text-align: center;
        }

        .wallet-info { margin-top: 15px; font-size: 16px; display: block; }
        .balance-text { color: gold; font-weight: bold; font-size: 20px; }
        
        .btn-check {
            background: #2ed573; color: white; border: none; padding: 10px 20px;
            font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-buy {
            background: #ff4757; color: white; border: none; padding: 12px 20px;
            font-size: 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
            margin-top: 15px; width: 100%; display: none; animation: pulse 1.5s infinite;
        }

        .instagram-link {
            display: inline-block; margin-top: 15px; padding: 10px 20px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 14px;
        }

        .btn-start {
            background: #444; color: #888; border: none; padding: 15px 25px;
            font-size: 18px; border-radius: 8px; width: 100%; font-weight: bold;
            transition: all 0.3s; pointer-events: none;
        }
        
        .btn-start.unlocked {
            background: #007bff; color: white; cursor: pointer; pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        .btn-start.unlocked:hover { background: #0056b3; transform: scale(1.02); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); } 100% { transform: scale(1); } }

        #btn-beta { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); background: #222; border: 1px solid #444; padding: 12px 18px; color: #fff; border-radius: 8px; cursor: pointer; z-index: 999999; font-size: 16px; font-weight: bold; display: none; }
        
        /* تعديلات زر التبديل لدعم الحركة وفك القفل */
        #btn-switch { 
            position: fixed; left: 20px; top: 20px; 
            background: rgba(0, 123, 255, 0.8); backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px); border: 2px solid rgba(255,255,255,0.2); 
            color: white; border-radius: 50%; width: 55px; height: 55px; 
            display: none; font-size: 24px; font-weight: bold; 
            align-items: center; justify-content: center; z-index: 999999; 
            cursor: pointer; touch-action: none; /* مهم لمنع سحب المتصفح مع الزر */
            transition: background 0.3s, box-shadow 0.3s, border 0.3s;
        }
        
        /* ستايل الزر عند فتح القفل والسحب */
        #btn-switch.dragging {
            border: 2px dashed #ff4757;
            transform: scale(1.1);
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
        }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999999; text-align: center; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>🔴 Multi Delt.io VIP</h1>
            <p class="credits">تطوير وبرمجة: <span>Remas</span> 🌷</p>
            
            <div id="auth-loading" style="color: #007bff; font-weight: bold; margin: 20px 0;">
                <i class="fas fa-spinner fa-spin"></i> جاري التحقق من حالة الاشتراك...
            </div>

            <div class="wallet-section" id="wallet-section-container" style="display: none;">
                <h3 style="margin-top:0; color:#2ed573;"><i class="fas fa-lock"></i> نظام الحماية والاشتراك</h3>
                
                <div style="background: #000; border: 1px dashed #007bff; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <span style="font-size: 13px; color: #007bff; display: block; margin-bottom: 10px;">رقم جهازك الثابت (انسخه للتعبئة):</span>
                    <div style="display: flex; justify-content: center; align-items: center; background: #111; border-radius: 8px; padding: 8px; border: 1px solid #333;">
                        <span id="display-device-id" style="font-family: monospace; color: #2ed573; font-size: 20px; font-weight: bold; letter-spacing: 1px; flex-grow: 1; text-align: left; padding-left: 10px;" class="allow-select"></span>
                        <button onclick="copyDeviceID()" style="background: #007bff; color: white; border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; transition: 0.3s; margin-left: 10px; pointer-events: auto;">
                            <i class="fas fa-copy" id="copy-icon"></i> <span id="copy-text">نسخ</span>
                        </button>
                    </div>
                </div>
                
                <button class="btn-check" onclick="manualCheck()"><i class="fas fa-sync-alt"></i> تحديث الرصيد والاشتراك</button>
                
                <div id="wallet-info" class="wallet-info">
                    <p>رصيدك الحالي: <span id="balance-display" class="balance-text">0.00$</span></p>
                    <p id="sub-status" style="font-weight:bold;"></p>
                    <button id="btn-buy" class="btn-buy" onclick="buySubscription()"><i class="fas fa-crown"></i> تفعيل قسم الـ VIP (7.99$ / شهر)</button>
                </div>
                
                <p style="font-size: 13px; color: #aaa; margin-top: 15px;">لتعبئة رصيد المحفظة، تواصل معي عبر:</p>
                <a href="https://www.instagram.com/6i99n?igsh=MW1wMTNpamJpMWNxeg==" target="_blank" class="instagram-link">
                    <i class="fab fa-instagram"></i> اضغط هنا للتواصل على الانستقرام
                </a>
            </div>

            <button id="btn-start" class="btn-start"><i class="fas fa-ban"></i> الدخول مقفل</button>
        </div>
    </div>

    <button id="btn-beta" class="action-btn">دخول beta 2</button>
    <div id="btn-switch">T</div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>جاري تجهيز النسخ...</h2>
        <p>للمعلومية ريماس قامت بتطويرها لكم 🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true" scrolling="no"></iframe>
    <iframe id="fans-frame" src="https://delt.io/" allowfullscreen="true" scrolling="no"></iframe>

    <script>
        // =======================================================
        // 1. دوال مساعدة خاصة بأجهزة أبل والآيفون (حماية الشاشة)
        // =======================================================

        // إخفاء شريط البحث في السفاري بشكل تلقائي
        function hideSafariSearchBar() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 100);
        }
        window.addEventListener("orientationchange", hideSafariSearchBar);
        window.addEventListener("load", hideSafariSearchBar);

        // منع القوائم المنبثقة، نسخ الشاشة، والمكبر عند اللعب بالجويستيك
        document.addEventListener('contextmenu', function(e) {
            // السماح في واجهة الدخول فقط
            if(!document.getElementById('welcome-screen').style.display || document.getElementById('welcome-screen').style.display !== 'none') return;
            e.preventDefault();
        });
        document.addEventListener('selectstart', function(e) {
            if(e.target.classList && e.target.classList.contains('allow-select')) return;
            e.preventDefault();
        });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });
        
        // منع التكبير المزدوج في الآيفون (Double Tap Zoom)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) { event.preventDefault(); }
            lastTouchEnd = now;
        }, false);

        // =======================================================
        // 2. إعدادات Firebase ونظام الحماية
        // =======================================================
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let userBalance = 0;
        let deviceIP = "";
        let deviceFingerprint = btoa(navigator.userAgent + screen.width + "x" + screen.height);

        function getDeviceID() {
            let id = localStorage.getItem('remas_fixed_vip_id');
            if (!id) {
                id = 'RMS-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                localStorage.setItem('remas_fixed_vip_id', id);
            }
            return id;
        }
        
        const currentCard = getDeviceID();
        document.getElementById("display-device-id").innerText = currentCard;

        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(data => { 
            deviceIP = data.ip; 
            autoCheckSystem();
        }).catch(e => { autoCheckSystem(); });

        function autoCheckSystem() {
            db.ref('senpa_points/' + currentCard).once('value', snap => {
                document.getElementById("auth-loading").style.display = "none";
                const data = snap.val();
                userBalance = data && data.balance ? parseFloat(data.balance) : 0;
                
                const now = Date.now();
                const btnStart = document.getElementById("btn-start");
                const walletSection = document.getElementById("wallet-section-container");

                if (data && data.sub_expiry && data.sub_expiry > now) {
                    if (data.sub_fp === deviceFingerprint || data.sub_ip === deviceIP || !data.sub_fp) {
                        walletSection.style.display = "none";
                        btnStart.classList.add("unlocked");
                        btnStart.innerHTML = "<i class='fas fa-play'></i> دخول للعبة الآن";
                        if (!data.sub_fp) {
                            db.ref('senpa_points/' + currentCard).update({ sub_fp: deviceFingerprint, sub_ip: deviceIP });
                        }
                    } else {
                        showSubscriptionUI(data, "⚠️ عذراً، هذا الاشتراك مرتبط بجهاز آخر!");
                    }
                } else {
                    showSubscriptionUI(data, "حالة الاشتراك: غير فعال 🔴");
                }
            });
        }

        function showSubscriptionUI(data, msg) {
            document.getElementById("wallet-section-container").style.display = "block";
            document.getElementById("balance-display").innerText = userBalance.toFixed(2) + "$";
            
            const subStatusText = document.getElementById("sub-status");
            const btnBuy = document.getElementById("btn-buy");
            const btnStart = document.getElementById("btn-start");

            subStatusText.innerText = msg;
            subStatusText.style.color = msg.includes("غير فعال") ? "#ff4757" : "#ff9f43";
            btnStart.classList.remove("unlocked");
            btnStart.innerHTML = "<i class='fas fa-ban'></i> الدخول مقفل";

            if (userBalance >= 7.99 && msg.includes("غير فعال")) {
                btnBuy.style.display = "block";
                subStatusText.innerHTML += "<br><small style='color:#2ed573;'>رصيدك يكفي! اضغط على تفعيل بالأسفل.</small>";
            } else if (msg.includes("غير فعال")) {
                btnBuy.style.display = "none";
                subStatusText.innerHTML += "<br><small style='color:#f09433;'>رصيدك لا يكفي للاشتراك، الرجاء التواصل لشحن النقاط.</small>";
            }
        }

        function manualCheck() {
            document.getElementById("wallet-section-container").style.display = "none";
            document.getElementById("auth-loading").style.display = "block";
            autoCheckSystem();
        }

        function buySubscription() {
            if (userBalance < 7.99) { alert("رصيدك غير كافٍ!"); return; }

            const newBalance = userBalance - 7.99;
            const expiryDate = Date.now() + (30 * 24 * 60 * 60 * 1000); 
            
            db.ref('senpa_points/' + currentCard).update({
                balance: newBalance,
                sub_expiry: expiryDate,
                sub_ip: deviceIP,
                sub_fp: deviceFingerprint 
            }).then(() => {
                alert("تم تفعيل اشتراكك بنجاح لمدة شهر!");
                manualCheck(); 
            }).catch(err => {
                alert("حدث خطأ أثناء التفعيل.");
            });
        }

        // =======================================================
        // دالة نسخ الآي دي الاحترافية (جديدة)
        // =======================================================
        function copyDeviceID() {
            const idText = document.getElementById("display-device-id").innerText;
            const tempInput = document.createElement("input");
            tempInput.value = idText;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999); /* لضمان العمل على الموبايل */
            try {
                document.execCommand("copy");
                const copyBtnText = document.getElementById("copy-text");
                const copyIcon = document.getElementById("copy-icon");
                copyBtnText.innerText = "تم!";
                copyIcon.className = "fas fa-check";
                setTimeout(() => { 
                    copyBtnText.innerText = "نسخ"; 
                    copyIcon.className = "fas fa-copy";
                }, 2000);
            } catch (err) {
                alert("يرجى النسخ يدوياً، جهازك لا يدعم النسخ التلقائي.");
            }
            document.body.removeChild(tempInput);
        }

        // =======================================================
        // 3. أكواد تشغيل اللعبة الأساسية
        // =======================================================
        const welcomeScreen = document.getElementById("welcome-screen");
        const btnStart = document.getElementById("btn-start");
        const btnBeta = document.getElementById("btn-beta");
        const btnSwitch = document.getElementById("btn-switch"); 
        const loadingScreen = document.getElementById("loading-screen");
        const gameFrame = document.getElementById("game-frame");
        const fansFrame = document.getElementById("fans-frame");
        
        let isAwake = false; let isSecondVersion = false; 

        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

        function keepPageAwake() {
            if (isAwake) return; isAwake = true;
            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.loop = true; silentAudio.play().catch(e => console.log("Audio Error"));
            if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(err => console.log("Wake Lock Error:", err)); }
        }

        document.addEventListener("click", keepPageAwake, { once: true });
        document.addEventListener("touchstart", keepPageAwake, { once: true });

        btnStart.addEventListener("click", () => {
            if(!btnStart.classList.contains("unlocked")) return; 
            keepPageAwake();
            welcomeScreen.style.display = "none";
            btnBeta.style.display = "block";
        });

        btnBeta.addEventListener("click", () => {
            keepPageAwake(); 
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم"));
                        }
                    }).catch(e => console.log(e));
                }
                hideSafariSearchBar(); // محاولة إخفاء الشريط مرة أخرى
            } catch (e) { console.log(e); }

            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none"; 
            
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnSwitch.style.display = "flex"; 
            }, 3000);
        });

        // =======================================================
        // 4. نظام تحريك زر T (Drag and Drop) والتبديل
        // =======================================================
        let dragTimeout;
        let isDragging = false;
        let initialX, initialY;
        
        // استعادة مكان الزر المحفوظ من الجلسة السابقة
        const savedLeft = localStorage.getItem("btnSwitch_left");
        const savedTop = localStorage.getItem("btnSwitch_top");
        if (savedLeft && savedTop) {
            btnSwitch.style.left = savedLeft;
            btnSwitch.style.top = savedTop;
            btnSwitch.style.right = 'auto'; // تجاوز الإعدادات الافتراضية
        }

        // دالة تبديل اللعبة (تعمل فقط إذا لم يكن اللاعب يقوم بسحب الزر)
        function toggleGameFrames() {
            keepPageAwake(); 
            isSecondVersion = !isSecondVersion; 
            if (isSecondVersion) {
                fansFrame.style.visibility = "visible"; fansFrame.style.opacity = "1"; fansFrame.style.pointerEvents = "auto";
                gameFrame.style.pointerEvents = "none";
                btnSwitch.style.background = "rgba(255, 71, 87, 0.8)"; 
                btnSwitch.style.boxShadow = "0 4px 15px rgba(255, 71, 87, 0.5)";
            } else {
                fansFrame.style.visibility = "hidden"; fansFrame.style.opacity = "0"; fansFrame.style.pointerEvents = "none";
                gameFrame.style.pointerEvents = "auto";
                btnSwitch.style.background = "rgba(0, 123, 255, 0.8)"; 
                btnSwitch.style.boxShadow = "0 4px 15px rgba(0, 0, 0, 0.5)";
            }
        }

        // أحداث اللمس (Touch) للزر
        btnSwitch.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            const touch = e.touches[0];
            const rect = btnSwitch.getBoundingClientRect();
            initialX = touch.clientX - rect.left;
            initialY = touch.clientY - rect.top;

            // إذا ضغط لمدة 350 ملي ثانية يتم فتح القفل
            dragTimeout = setTimeout(() => {
                isDragging = true;
                btnSwitch.classList.add("dragging");
                // اهتزاز خفيف للأجهزة المدعومة كتنبيه بفتح القفل
                if (navigator.vibrate) { navigator.vibrate(50); } 
            }, 350);
        }, { passive: false });

        btnSwitch.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // إيقاف تمرير الشاشة في الخلفية
            const touch = e.touches[0];
            
            // حساب الموضع الجديد ومنع خروج الزر خارج حواف الشاشة
            let newX = touch.clientX - initialX;
            let newY = touch.clientY - initialY;
            
            newX = Math.max(0, Math.min(newX, window.innerWidth - btnSwitch.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - btnSwitch.offsetHeight));

            btnSwitch.style.left = newX + 'px';
            btnSwitch.style.top = newY + 'px';
            btnSwitch.style.right = 'auto'; 
        }, { passive: false });

        btnSwitch.addEventListener('touchend', (e) => {
            clearTimeout(dragTimeout);
            if (isDragging) {
                // إقفال الزر في مكانه الجديد
                isDragging = false;
                btnSwitch.classList.remove("dragging");
                // حفظ المكان الجديد في المتصفح
                localStorage.setItem("btnSwitch_left", btnSwitch.style.left);
                localStorage.setItem("btnSwitch_top", btnSwitch.style.top);
            } else {
                // إذا لم يتم السحب (مجرد ضغطة سريعة)، قم بالتبديل
                toggleGameFrames();
            }
        });

        // تبديل باستخدام لوحة المفاتيح
        document.addEventListener("keydown", (e) => {
            if (e.code === "Tab" && btnSwitch.style.display !== "none") {
                e.preventDefault(); toggleGameFrames(); 
            }
        });
    </script>
</body>
</html>
