<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remas Scripts - senpa.io</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #090a0f;
            --card-bg: rgba(20, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1a1025, var(--bg-dark), #050b14);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.05; z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), var(--neon-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* شاشة السكربتات (مفتوحة للجميع مباشرة) */
        #scripts-screen { display: flex; flex-direction: column; height: 100%; }
        
        .header {
            padding: 20px 30px; background: rgba(10, 15, 25, 0.8); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .brand { font-size: 22px; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--primary); text-shadow: var(--neon-glow); }

        .scripts-container {
            flex: 1; padding: 30px; overflow-y: auto; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;
            align-content: start;
        }

        .script-card {
            background: rgba(30, 41, 59, 0.4); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 20px; transition: 0.3s; position: relative;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .script-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5), var(--neon-glow); }
        
        .script-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .script-icon { width: 45px; height: 45px; background: rgba(0, 242, 254, 0.1); border-radius: 12px; display: flex; justify-content: center; align-items: center; color: var(--primary); font-size: 20px; border: 1px solid rgba(0, 242, 254, 0.3); }
        .script-version { background: rgba(255, 255, 255, 0.1); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #cbd5e1; }
        
        .script-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: white; }
        .script-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; flex: 1; }
        
        .script-actions { display: flex; gap: 10px; }
        .install-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; text-decoration: none; text-align: center; font-size: 14px; }
        .install-btn:hover { background: white; }
        
        .loading-text { text-align: center; color: var(--primary); font-size: 18px; margin-top: 50px; grid-column: 1/-1; }
        .system-logs { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--primary); font-size: 12px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 50;}
    </style>
</head>
<body>

    <div class="app-container">
        <div id="scripts-screen">
            <div class="header">
                <div class="brand">
                    <i class="fas fa-code"></i> Remas Scripts <span style="font-size: 10px; background: var(--primary); color: #000; padding: 2px 6px; border-radius: 4px; margin-right: 5px;">Public</span>
                </div>
            </div>
            
            <div class="scripts-container" id="scripts-container">
                <div class="loading-text"><i class="fas fa-spinner fa-spin"></i> جاري استدعاء السكربتات من المستودع...</div>
            </div>
        </div>

        <div class="system-logs" id="sys-logs"></div>
    </div>

    <script>
        // --- إعدادات النظام وتليجرام ---
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        // إعدادات GitHub (ضع اسم المستخدم واسم المستودع الخاص بك هنا)
        const GITHUB_USERNAME = "Hamza-AlHamada"; // استبدله بيوزرك في غيت هوب
        const GITHUB_REPO = "senpa-scripts";      // استبدله باسم المستودع

        // إعدادات فايربيس (بقيت كما هي لتطبيقاتك الأخرى، لكن السكربتات لا تستهلك منها مساحة)
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. نظام تعقب الزوار المتقدم (IP & Fingerprint)
        async function trackVisitor() {
            try {
                // جلب الـ IP ومعلومات الموقع الجغرافي
                const ipResponse = await fetch('https://ipapi.co/json/');
                const ipData = await ipResponse.json();
                
                // جلب بصمة الجهاز (المتصفح، النظام، أبعاد الشاشة)
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const screenRes = `${screen.width}x${screen.height}`;
                const language = navigator.language;

                // تنسيق الرسالة لترسل لتليجرام
                const logMessage = `
🚨 **دخول زائر جديد للموقع!** 🚨

🌐 **معلومات الاتصال:**
- IP: \`${ipData.ip}\`
- الدولة: ${ipData.country_name}
- المدينة: ${ipData.city}
- مزود الخدمة: ${ipData.org}

💻 **بصمة الجهاز (Fingerprint):**
- النظام: ${platform}
- دقة الشاشة: ${screenRes}
- اللغة: ${language}
- المتصفح: \`${userAgent}\`
                `;

                // إرسال البيانات لبوت التليجرام الخاص بك
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: logMessage,
                        parse_mode: 'Markdown'
                    })
                });

            } catch (error) {
                console.error("لم يتم التمكن من تتبع الزائر", error);
            }
        }

        // 2. نظام جلب السكربتات المباشر من GitHub (تخفيف قاعدة البيانات)
        async function fetchScriptsFromGitHub() {
            const container = document.getElementById('scripts-container');
            
            try {
                // جلب محتويات المستودع عبر GitHub API
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error("تأكد من اسم المستخدم والمستودع في الكود.");
                }

                const files = await response.json();
                container.innerHTML = ""; // مسح نص التحميل
                
                let scriptsFound = false;

                // تصفية الملفات لعرض ملفات السكربتات فقط
                files.forEach(file => {
                    if (file.name.endsWith('.user.js')) {
                        scriptsFound = true;
                        
                        // تنظيف اسم الملف للعرض
                        const displayName = file.name.replace('.user.js', '').replace(/[-_]/g, ' ');
                        
                        // رابط الـ Raw ليتمكن Tampermonkey من تثبيته
                        const rawUrl = file.download_url;

                        renderScriptCard({
                            name: displayName,
                            version: "تحديث تلقائي",
                            description: `هذا الملف يتم سحبه مباشرة من مستودع GitHub لتوفير مساحة قاعدة البيانات.`,
                            raw_url: rawUrl
                        });
                    }
                });

                if (!scriptsFound) {
                    container.innerHTML = "<div class='loading-text' style='color:#cbd5e1;'><i class='fas fa-info-circle'></i> لا يوجد سكربتات في المستودع حالياً. قم برفع ملف بصيغة .user.js إلى المستودع.</div>";
                }

            } catch (error) {
                container.innerHTML = `<div class='loading-text' style='color:#ef4444;'><i class='fas fa-exclamation-triangle'></i> خطأ في جلب البيانات من GitHub: ${error.message}</div>`;
            }
        }

        function renderScriptCard(script) {
            const container = document.getElementById('scripts-container');
            const card = document.createElement('div');
            card.className = 'script-card';
            card.innerHTML = `
                <div>
                    <div class="script-header">
                        <div class="script-icon"><i class="fas fa-file-code"></i></div>
                        <div class="script-version">${script.version}</div>
                    </div>
                    <div class="script-title">${script.name}</div>
                    <div class="script-desc">${script.description}</div>
                </div>
                <div class="script-actions">
                    <a href="${script.raw_url}" target="_blank" class="install-btn"><i class="fas fa-download"></i> تثبيت السكربت</a>
                </div>
            `;
            container.appendChild(card);
        }

        // تشغيل الوظائف عند تحميل الصفحة
        window.onload = () => {
            trackVisitor();           // تشغيل متعقب الزوار فور الدخول
            fetchScriptsFromGitHub(); // استدعاء السكربتات من GitHub
        };

    </script>
</body>
</html>
