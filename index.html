<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remas Chat - المطور</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 80vh; background: #1e293b; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #334155; padding: 10px; border-radius: 10px; font-size: 14px; max-width: 80%; }
        .user-name { font-weight: bold; color: #3b82f6; display: block; font-size: 12px; }
        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; background: #334155; color: white; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #status { font-size: 12px; padding: 5px; text-align: center; background: #ef4444; display: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="status">خطأ في الاتصال بتليجرام!</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب هنا...">
            <button id="sendBtn">إرسال</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        // جرب إضافة -100 قبل الآيدي إذا كان قروب كبير (Supergroup)
        const CHAT_ID = "-1003783270855"; 

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const statusDiv = document.getElementById('status');
        let lastUpdateId = 0;
        let myName = "زائر_" + Math.floor(Math.random() * 1000);

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `[${myName}]: ${text}`
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    messageInput.value = "";
                    statusDiv.style.display = "none";
                    // التعديل هنا: عرض الرسالة فوراً في الموقع بعد نجاح إرسالها
                    renderMessage(data.result); 
                } else {
                    showError("خطأ من تليجرام: " + data.description);
                }
            } catch (error) {
                showError("فشل الإرسال: تأكد من اتصال الإنترنت أو إعدادات CORS");
            }
        }

        function showError(msg) {
            statusDiv.innerText = msg;
            statusDiv.style.display = "block";
            console.error(msg);
        }

        async function fetchMessages() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.text) {
                            renderMessage(update.message);
                        }
                    });
                }
            } catch (e) { console.log("جاري الانتظار..."); }
        }

        function renderMessage(msg) {
            if (!msg || !msg.text) return; // حماية إضافية من الأخطاء
            const div = document.createElement('div');
            div.className = 'message';
            
            // استخراج اسم المرسل والرسالة بأمان
            const sender = msg.text.includes(']: ') ? msg.text.split(']: ')[0].replace('[', '') : (msg.from && msg.from.first_name ? msg.from.first_name : "عضو");
            const text = msg.text.includes(']: ') ? msg.text.substring(msg.text.indexOf(']: ') + 3) : msg.text;
            
            div.innerHTML = `<span class="user-name">${sender}</span>${text}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        setInterval(fetchMessages, 3000);
    </script>
</body>
</html>
