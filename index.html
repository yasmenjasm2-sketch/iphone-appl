<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>puls Chat - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --chat-bg: #1e293b;
            --msg-bg: #334155;
            --text-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-dark), #1e1b4b);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية التطبيق */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* شاشة تسجيل الدخول */
        #auth-screen {
            display: flex;
            flex-direction: column;
            padding: 30px;
            height: 100%;
            justify-content: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }
        
        #auth-screen h2 { text-align: center; margin-bottom: 20px; color: var(--secondary); }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #475569;
            background: #0f172a; color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); }
        
        .file-upload { margin-bottom: 15px; text-align: center; }
        .file-upload input { display: none; }
        .file-upload label {
            display: inline-block; padding: 10px 20px; background: #334155;
            border-radius: 10px; cursor: pointer; color: #cbd5e1; transition: 0.3s;
        }
        .file-upload label:hover { background: #475569; }
        #preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 2px solid var(--primary); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .toggle-auth { text-align: center; margin-top: 15px; cursor: pointer; color: #94a3b8; font-size: 14px; }
        .toggle-auth:hover { color: white; }

        /* شاشة الدردشة */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        
        .chat-header {
            padding: 15px; background: rgba(15, 23, 42, 0.9); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #334155;
        }
        .header-buttons { display: flex; gap: 8px; }
        .header-btn { padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; border: none; color: white; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .logout-btn { background: #ef4444; }
        .logout-btn:hover { background: #dc2626; }
        .edit-img-btn { background: var(--primary); }
        .edit-img-btn:hover { background: #4338ca; }

        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* تصميم الرسائل */
        .msg-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        .msg-wrapper.mine { flex-direction: row-reverse; }
        
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #475569; }
        
        .message {
            background: var(--msg-bg); padding: 12px; border-radius: 15px; border-bottom-right-radius: 2px;
            max-width: 75%; position: relative; word-wrap: break-word; font-size: 14px;
        }
        .msg-wrapper.mine .message { background: var(--primary); border-bottom-right-radius: 15px; border-bottom-left-radius: 2px; }
        
        .user-name { font-weight: bold; display: block; font-size: 12px; margin-bottom: 5px; color: #93c5fd; }
        .msg-wrapper.mine .user-name { color: #c7d2fe; text-align: left; }
        
        .admin-badge { background: #fbbf24; color: black; font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-right: 5px; font-weight: bold; }

        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; border-top: 1px solid #334155; }
        .input-area input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; background: #1e293b; color: white; }
        .input-area button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* نافذة البروفايل (Modal) */
        #profile-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .profile-card {
            background: var(--chat-bg); width: 80%; padding: 20px; border-radius: 20px;
            text-align: center; border: 1px solid #475569; position: relative;
        }
        .close-modal { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; color: #ef4444; }
        .profile-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 15px; }
        .profile-card h3 { margin-bottom: 5px; }
        .profile-card p { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        
        /* رسائل النظام */
        .system-msg { text-align: center; color: #10b981; font-size: 12px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="auth-screen">
            <h2 id="auth-title">تسجيل الدخول</h2>
            
            <div id="register-fields" style="display: none;">
                <div class="file-upload">
                    <label for="avatarInput"><i class="fas fa-camera"></i> اختيار صورة بروفايل (إلزامي)</label>
                    <input type="file" id="avatarInput" accept="image/*">
                    <img id="preview-img" alt="Preview">
                </div>
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="اسم العرض (الحد الأقصى 25 حرف)" maxlength="25">
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="auth-username" placeholder="اليوزر نيم (5 إلى 24 حرف)" minlength="5" maxlength="24">
            </div>
            <div class="input-group">
                <input type="password" id="auth-password" placeholder="كلمة المرور (أقل شيء 6 أحرف)">
            </div>

            <button class="btn" id="auth-btn" onclick="handleAuth()">دخول</button>
            <div class="toggle-auth" id="toggle-auth-btn" onclick="toggleAuthMode()">لا تملك حساب؟ إنشاء حساب جديد</div>
        </div>

        <div id="chat-screen">
            <div class="chat-header">
                <div>
                    <strong>Remas Chat</strong> <i class="fas fa-circle" style="color:#10b981; font-size:10px;"></i>
                </div>
                <div class="header-buttons">
                    <label for="changeAvatarInput" class="header-btn edit-img-btn">
                        <i class="fas fa-camera"></i> صورة
                    </label>
                    <input type="file" id="changeAvatarInput" accept="image/*" style="display: none;">
                    
                    <button class="header-btn logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
            </div>
            
            <div id="messages"></div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="profile-modal">
            <div class="profile-card">
                <span class="close-modal" onclick="closeProfile()">&times;</span>
                <img id="modal-img" src="" alt="Profile">
                <h3 id="modal-name">الاسم</h3>
                <p id="modal-user">@username</p>
                <p>ID: <span id="modal-id">0000</span></p>
                <p id="modal-role" style="color: var(--secondary); font-weight: bold;"></p>
            </div>
        </div>

    </div>

    <script>
        // --- إعدادات النظام ---
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const usersRef = db.ref("users");
        const messagesRef = db.ref("public_chat");

        let currentUser = null;
        let isRegisterMode = false;
        let selectedAvatarBase64 = "";

        // --- تهيئة حساب الأدمن الرئيسي ---
        function initMainAdmin() {
            usersRef.child("hamza").once('value', snapshot => {
                if (!snapshot.exists()) {
                    usersRef.child("hamza").set({
                        username: "hamza",
                        displayName: "admin",
                        password: "gmailcom34567",
                        id: "1111",
                        role: "admin",
                        banned: false,
                        avatar: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                    });
                }
            });
        }
        initMainAdmin();

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "إنشاء حساب جديد" : "تسجيل الدخول";
            document.getElementById('auth-btn').innerText = isRegisterMode ? "إنشاء حساب" : "دخول";
            document.getElementById('toggle-auth-btn').innerText = isRegisterMode ? "لديك حساب؟ تسجيل الدخول" : "لا تملك حساب؟ إنشاء حساب جديد";
            document.getElementById('register-fields').style.display = isRegisterMode ? "block" : "none";
        }

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedAvatarBase64 = event.target.result;
                    document.getElementById('preview-img').src = selectedAvatarBase64;
                    document.getElementById('preview-img').style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        // --- تغيير الصورة للمستخدم الحالي ---
        document.getElementById('changeAvatarInput').addEventListener('change', function(e) {
            if(!currentUser) return;
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newBase64 = event.target.result;
                    usersRef.child(currentUser.username).update({ avatar: newBase64 }).then(() => {
                        alert("تم تغيير صورتك بنجاح!");
                        currentUser.avatar = newBase64;
                        localStorage.setItem('chatSession', JSON.stringify(currentUser));
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        async function handleAuth() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            // تعديل الحد الأدنى لليوزر إلى 5 ليقبل حساب hamza
            if (username.length < 5 || username.length > 24) return alert("اليوزر يجب أن يكون بين 5 و 24 حرف");
            if (password.length < 6) return alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");

            if (isRegisterMode) {
                const name = document.getElementById('reg-name').value.trim();
                if (name.length === 0 || name.length > 25) return alert("يرجى إدخال اسم صحيح (الحد الأقصى 25)");
                if (!selectedAvatarBase64) return alert("يجب اختيار صورة للبروفايل!");

                usersRef.child(username).once('value', snapshot => {
                    if (snapshot.exists()) {
                        alert("اليوزر نيم مستخدم مسبقاً!");
                    } else {
                        const newId = Math.floor(10000 + Math.random() * 90000).toString();
                        const userData = {
                            username: username,
                            displayName: name,
                            password: password,
                            id: newId,
                            role: "user",
                            banned: false,
                            avatar: selectedAvatarBase64
                        };
                        usersRef.child(username).set(userData).then(() => {
                            sendTelegramNotification(userData);
                            loginUser(userData);
                        });
                    }
                });
            } else {
                usersRef.child(username).once('value', snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        if (data.password === password) {
                            if (data.banned) return alert("هذا الحساب محظور من الإدارة!");
                            loginUser(data);
                        } else {
                            alert("كلمة المرور خاطئة!");
                        }
                    } else {
                        alert("الحساب غير موجود!");
                    }
                });
            }
        }

        function loginUser(userData) {
            currentUser = userData;
            localStorage.setItem('chatSession', JSON.stringify(userData));
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('chat-screen').style.display = "flex";
            listenToMessages();
            checkBanStatus();
        }

        function logout() {
            localStorage.removeItem('chatSession');
            location.reload();
        }

        window.onload = () => {
            const saved = localStorage.getItem('chatSession');
            if (saved) {
                const parsed = JSON.parse(saved);
                usersRef.child(parsed.username).once('value', snap => {
                    if(snap.exists() && !snap.val().banned) {
                        loginUser(snap.val());
                    } else {
                        localStorage.removeItem('chatSession');
                    }
                });
            }
        };

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');

        function listenToMessages() {
            messagesDiv.innerHTML = ""; 
            messagesRef.limitToLast(100).on("child_added", (snapshot) => {
                const data = snapshot.val();
                appendMessage(data);
            });
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function sendMessage() {
            if (!currentUser) return;
            const text = messageInput.value.trim();
            if (!text) return;

            const msgData = {
                username: currentUser.username,
                text: text,
                time: Date.now()
            };

            messagesRef.push(msgData);
            messageInput.value = "";
        }

        function appendMessage(data) {
            usersRef.child(data.username).once('value', snap => {
                if (!snap.exists()) return;
                const user = snap.val();
                const isMine = currentUser && user.username === currentUser.username;
                const adminTag = user.role === 'admin' ? '<span class="admin-badge">Admin ⭐</span>' : '';

                const div = document.createElement('div');
                div.className = `msg-wrapper ${isMine ? 'mine' : ''}`;
                
                const imgStr = `<img class="msg-avatar" src="${user.avatar}" onclick="showProfile('${user.displayName}', '${user.username}', '${user.id}', '${user.role}', '${user.avatar}')">`;
                
                const msgStr = `
                    <div class="message">
                        <span class="user-name">${adminTag} ${user.displayName}</span>
                        ${data.text}
                    </div>
                `;

                div.innerHTML = isMine ? msgStr + imgStr : imgStr + msgStr;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        function showProfile(name, username, id, role, avatar) {
            document.getElementById('modal-img').src = avatar;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-user').innerText = "@" + username;
            document.getElementById('modal-id').innerText = id;
            document.getElementById('modal-role').innerText = role === 'admin' ? "مدير النظام ⭐" : "مستخدم";
            document.getElementById('profile-modal').style.display = "flex";
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = "none";
        }

        function sendTelegramNotification(user) {
            const text = `👤 تسجيل مستخدم جديد!\n\nاسم العرض: ${user.displayName}\nاليوزر: @${user.username}\nالايدي: ${user.id}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
        }

        let lastUpdateId = 0;
        async function pollTelegramCommands() {
            if (!currentUser) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if (data.ok) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.text) {
                            const text = update.message.text;
                            if (text.startsWith('/ban ')) {
                                const targetId = text.split(' ')[1];
                                updateUserStatusById(targetId, { banned: true });
                            } 
                            else if (text.startsWith('/unban ')) {
                                const targetId = text.split(' ')[1];
                                updateUserStatusById(targetId, { banned: false });
                            }
                            else if (text.startsWith('/admin ')) {
                                const targetId = text.split(' ')[1];
                                updateUserStatusById(targetId, { role: "admin" });
                            }
                        }
                    });
                }
            } catch (e) {}
        }

        function updateUserStatusById(targetId, updateData) {
            usersRef.once('value', snapshot => {
                snapshot.forEach(child => {
                    if (child.val().id === targetId) {
                        usersRef.child(child.key).update(updateData);
                        const msg = document.createElement('div');
                        msg.className = 'system-msg';
                        msg.innerText = `تم تحديث صلاحيات الايدي ${targetId} من قبل الإدارة`;
                        messagesDiv.appendChild(msg);
                    }
                });
            });
        }

        function checkBanStatus() {
            if (!currentUser) return;
            usersRef.child(currentUser.username).on('value', snap => {
                if (snap.exists()) {
                    const user = snap.val();
                    currentUser = user; 
                    if (user.banned) {
                        alert("تم حظرك من قبل الإدارة!");
                        logout();
                    }
                }
            });
        }

        setInterval(pollTelegramCommands, 4000);

    </script>
</body>
</html>
