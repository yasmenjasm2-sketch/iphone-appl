<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDoy - شات جماعي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 95%;
            max-width: 500px;
            height: 85vh;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            background: #334155;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        .message .user-name {
            display: block;
            font-weight: bold;
            color: #3b82f6;
            font-size: 12px;
            margin-bottom: 4px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-area {
            background: #0f172a;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }
        input {
            flex: 1;
            background: #334155;
            border: 1px solid #475569;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        /* واجهة اختيار الاسم */
        #name-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .name-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="name-overlay">
        <div class="name-box">
            <h3>مرحباً بك في ChatDoy</h3>
            <input type="text" id="userNameInput" placeholder="أدخل اسمك المستعار..." style="margin-bottom: 15px; width: 80%;">
            <br>
            <button id="startChatBtn">دخول الشات</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
            <button id="sendBtn">إرسال</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        
        // ⚠️ يجب وضع ID المجموعة هنا (Group ID) 
        // تأكد من إضافة البوت للمجموعة أولاً
        const CHAT_ID = "-1004999759094"; // استبدل هذا بالـ ID الحقيقي لمجموعتك

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const nameOverlay = document.getElementById('name-overlay');
        const userNameInput = document.getElementById('userNameInput');
        const startChatBtn = document.getElementById('startChatBtn');

        let myName = "";
        let lastUpdateId = 0;
        let processedMessages = new Set(); // لمنع تكرار الرسائل

        // الدخول للشات
        startChatBtn.onclick = () => {
            const name = userNameInput.value.trim();
            if (name) {
                myName = name;
                nameOverlay.style.display = "none";
                fetchMessages(); // بدء جلب الرسائل
                setInterval(fetchMessages, 3000); // تحديث كل 3 ثواني
            }
        };

        // عرض الرسائل في الواجهة
        function appendMessage(user, text) {
            const msgId = user + text; // معرف بسيط لمنع التكرار
            if (processedMessages.has(msgId)) return;
            processedMessages.add(msgId);

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.innerHTML = `<span class="user-name">${user}</span>${text}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // إرسال الرسالة
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const fullMessage = `[${myName}]: ${text}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullMessage
                    })
                });
                messageInput.value = "";
            } catch (e) {
                console.error("فشل الإرسال");
            }
        }

        // جلب الرسائل من تليجرام (ليراها الجميع)
        async function fetchMessages() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();

                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.text) {
                            const rawText = update.message.text;
                            
                            // تحليل النص لاستخراج الاسم والرسالة
                            if (rawText.includes("]: ")) {
                                const parts = rawText.split("]: ");
                                const sender = parts[0].replace("[", "");
                                const msg = parts[1];
                                appendMessage(sender, msg);
                            } else {
                                // رسائل مرسلة مباشرة من تليجرام
                                appendMessage(update.message.from.first_name, rawText);
                            }
                        }
                    });
                }
            } catch (e) {
                console.error("فشل التحديث");
            }
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
