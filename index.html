<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remas Chat - Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 85vh; background: #1e293b; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #334155; padding: 10px; border-radius: 10px; font-size: 14px; max-width: 85%; border-right: 4px solid #3b82f6; }
        .user-name { font-weight: bold; color: #3b82f6; display: block; font-size: 11px; margin-bottom: 4px; }
        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; outline: none; background: #334155; color: white; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; padding: 5px; text-align: center; background: #10b981; color: white; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="status">دردشة جماعية مباشرة 🟢</div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالة للجميع...">
            <button id="sendBtn">إرسال</button>
        </div>
    </div>

    <script>
        // إعدادات تليجرام
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref("public_chat");

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        let myName = "زائر_" + Math.floor(Math.random() * 1000);

        // --- استقبال الرسائل وعرضها للجميع فوراً ---
        messagesRef.limitToLast(50).on("child_added", (snapshot) => {
            const data = snapshot.val();
            appendMessage(data.user, data.text);
        });

        // --- إرسال الرسالة ---
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 1. الحفظ في Firebase (ليراها الجميع في الموقع)
            messagesRef.push({
                user: myName,
                text: text,
                time: Date.now()
            });

            // 2. الإرسال إلى تليجرام
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `💬 من الموقع [${myName}]:\n${text}`
                })
            });

            messageInput.value = "";
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="user-name">${sender}</span>${text}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // جلب ردود المطور من تليجرام
        let lastUpdateId = 0;
        async function fetchFromTelegram() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();
                if (data.ok) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.text && !update.message.text.includes("من الموقع")) {
                            appendMessage("المطور (تليجرام)", update.message.text);
                        }
                    });
                }
            } catch (e) {}
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        setInterval(fetchFromTelegram, 3000);
    </script>
</body>
</html>
