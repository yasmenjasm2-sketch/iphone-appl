<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDoy - غرفة الدردشة</title>
    <style>
        /* تصميم عصري وبسيط */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 95%;
            max-width: 500px;
            height: 85vh;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            background: #334155;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-area {
            background: #0f172a;
            padding: 15px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: #334155;
            border: 1px solid #475569;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="messages">
            </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
            <button id="sendBtn">إرسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDdbUK04WTiBvv3z1K9oYhssfpJTI9fZh4",
            authDomain: "chatdoy.firebaseapp.com",
            databaseURL: "https://chatdoy-default-rtdb.firebaseio.com",
            projectId: "chatdoy",
            storageBucket: "chatdoy.firebasestorage.app",
            messagingSenderId: "922018470576",
            appId: "1:922018470576:web:6f8c2c6fe1ca97a44cb975",
            measurementId: "G-MKSSEJ7QJ4"
        };

        // تهيئة التطبيق وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesDiv = document.getElementById('messages');

        // إرسال الرسالة مع تتبع الأخطاء
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                // تغيير حالة الزر أثناء الإرسال
                sendBtn.disabled = true;
                sendBtn.innerText = "جاري...";

                try {
                    await push(messagesRef, {
                        text: text,
                        time: new Date().toLocaleTimeString()
                    });
                    messageInput.value = ""; // مسح الحقل بعد نجاح الإرسال
                } catch (error) {
                    console.error("خطأ في Firebase:", error);
                    alert("لم يتم الإرسال! يرجى التأكد من صلاحيات Firebase Rules.");
                } finally {
                    // إعادة الزر لحالته الطبيعية
                    sendBtn.disabled = false;
                    sendBtn.innerText = "إرسال";
                    messageInput.focus();
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // استقبال الرسائل وعرضها فوراً
        try {
            onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                msgDiv.innerHTML = `<strong>زائر:</strong> <br> ${msg.text}`;
                messagesDiv.appendChild(msgDiv);
                
                // النزول التلقائي لآخر رسالة
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        } catch (error) {
            console.error("خطأ في استقبال الرسائل:", error);
        }
    </script>
</body>
</html>
