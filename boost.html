<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الرشق - Boost Section | Remas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-main: #050b14;
            --bg-grad-1: #1a1025;
            --bg-grad-2: #090a0f;
            --card-bg: rgba(20, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.4);
            --input-bg: rgba(0, 0, 0, 0.5);
            --pending: #f59e0b;
            --success: #10b981;
            --rejected: #ef4444;
        }

        body.light-mode {
            --primary: #0078d4;
            --secondary: #00b4db;
            --bg-main: #eef2f3;
            --bg-grad-1: #ffffff;
            --bg-grad-2: #e0e5ec;
            --card-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
            --text-muted: #475569;
            --neon-glow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --input-bg: rgba(240, 244, 248, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; }

        body {
            background: radial-gradient(circle at top right, var(--bg-grad-1), var(--bg-grad-2), var(--bg-main));
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-attachment: fixed; padding: 20px; gap: 20px;
        }

        .boost-container, .orders-container {
            width: 100%; max-width: 600px; background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), var(--neon-glow); padding: 30px; position: relative;
        }

        .header-title { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .header-title h2 { color: var(--primary); font-size: 24px; text-shadow: var(--neon-glow); }
        .header-title p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        
        select, input {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--input-bg); color: var(--text-main); font-size: 15px; outline: none;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }
        select option { background: var(--bg-main); color: var(--text-main); }

        .submit-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: var(--neon-glow); }
        .submit-btn:disabled { background: #334155; opacity: 0.8; cursor: not-allowed; transform: none; box-shadow: none; }

        .back-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; }
        .back-btn:hover { color: var(--primary); }

        .alert-msg { display: none; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; line-height: 1.5; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .alert-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }

        /* ستايل الطلبات */
        .order-card {
            background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 15px; margin-bottom: 15px; cursor: pointer; position: relative; overflow: hidden;
        }
        .order-card:hover { border-color: var(--primary); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--pending); border: 1px solid var(--pending); }
        .status-success { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: var(--rejected); border: 1px solid var(--rejected); }
        .order-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--glass-border); font-size: 14px; color: var(--text-muted); }
        .order-card.open .order-details { display: block; }

        [dir="ltr"] .back-btn { left: auto; right: 20px; }
    </style>
</head>
<body>

    <div class="boost-container">
        <button class="back-btn" onclick="window.location.href='index.html'" title="رجوع / Back"><i class="fas fa-arrow-left"></i></button>
        
        <div class="header-title">
            <h2><i class="fas fa-rocket"></i> قسم الرشق</h2>
            <p>Free & Paid Boosting Services</p>
        </div>

        <div id="alertBox" class="alert-msg"></div>

        <form id="boostForm">
            <div class="form-group">
                <label><i class="fas fa-share-alt"></i> المنصة / Platform</label>
                <select id="platform" required onchange="updateServices()">
                    <option value="" disabled selected>اختر المنصة / Choose Platform</option>
                    <option value="Instagram">Instagram - انستغرام</option>
                    <option value="TikTok">TikTok - تيك توك</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-list"></i> الخدمة المطلوبة / Required Service</label>
                <select id="service" required onchange="updatePackages()">
                    <option value="" disabled selected>اختر الخدمة / Choose Service</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-gem"></i> الباقة / Package</label>
                <select id="packageSelect" required>
                    <option value="" disabled selected>اختر الباقة / Choose Package</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-link"></i> الرابط أو المعرف / Link or Username</label>
                <input type="text" id="targetLink" required placeholder="ضع الرابط أو المعرف هنا / Paste link or username here">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> إرسال الطلب / Submit Request
            </button>
        </form>
    </div>

    <div class="orders-container">
        <div class="header-title" style="margin-bottom: 15px; padding-bottom: 10px;">
            <h3 style="color: var(--primary);"><i class="fas fa-box-open"></i> طلباتي | يجب الحساب لايكون خاصMy Orders</h3>
            <p style="font-size: 12px;">اضغط على الطلب لعرض التفاصيل</p>
        </div>
        <div id="ordersList">
            <p style="text-align: center; color: var(--text-muted);">جاري التحميل...</p>
        </div>
    </div>

    <script>
        // إعدادات البوت والـ Firebase الخاصة بك
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userIP = "";
        let sanitizedIP = "";
        let isVPNDetected = false;
        let hasGlobalOrder = false; 
        let countdownTimer;

        if (localStorage.getItem('remas_theme') === 'light') document.body.classList.add('light-mode');

        // جلب الـ IP وفحص الـ VPN المخادع
        fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
            userIP = data.ip;
            sanitizedIP = userIP.replace(/\./g, '_');
            
            // خوارزمية كشف الـ VPN البسيطة
            const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const isp = (data.org || "").toLowerCase();
            const suspiciousWords = ['hosting', 'cloud', 'datacenter', 'vpn', 'proxy', 'tor', 'digitalocean', 'aws', 'amazon', 'google', 'linode', 'ovh'];
            
            // الفحص الأول: اختلاف الوقت بين المتصفح وسيرفر الـ IP
            if (data.timezone && browserTz !== data.timezone) {
                isVPNDetected = true;
            }
            // الفحص الثاني: مزود الخدمة ينتمي لسيرفرات سحابية
            if (suspiciousWords.some(word => isp.includes(word))) {
                isVPNDetected = true;
            }

            if(isVPNDetected) {
                showAlert("⚠️ تم اكتشاف استخدام (VPN/Proxy). يُرجى إيقافه وإعادة تحميل الصفحة لتتمكن من الطلب.", "error");
                const btn = document.getElementById("submitBtn");
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-ban"></i> غير مسموح بالـ VPN';
            }

            loadMyOrders();
        }).catch(err => {
            document.getElementById('ordersList').innerHTML = "<p style='text-align:center;'>فشل في جلب البيانات.</p>";
        });

        const services = {
            "Instagram": {
                "ig_followers": { name: "متابعين / Followers", packages: ["مجانًا (حد أقصى 20) | Free (Max 20)"] },
                "ig_likes": { name: "إعجابات / Likes", packages: ["مجانًا (حد أقصى 100) | Free (Max 100)"] },
                "ig_views": { 
                    name: "مشاهدات / Views", 
                    packages: [
                        "مجانًا (حد أقصى 400) | Free (Max 400)",
                        "مدفوع 5$ (1000 مشاهدة) | Paid 5$ (1000 Views)",
                        "مدفوع 10$ (2500 مشاهدة) | Paid 10$ (2500 Views)"
                    ] 
                },
                "ig_saves": { name: "حفظ / Saves", packages: ["مجانًا | Free Saves"] },
                "ig_shares": { name: "مشاركة / Shares", packages: ["مجانًا | Free Shares"] },
                "ig_story": { name: "مشاهدات ستوري / Story Views", packages: ["مجانًا | Free Story Views"] }
            },
            "TikTok": {
                "tk_followers": { name: "متابعون / Followers", packages: ["مجانًا (حد أقصى 20) | Free (Max 20)"] },
                "tk_likes": { name: "إعجابات / Likes", packages: ["مجانًا (حد أقصى 50) | Free (Max 50)"] },
                "tk_views": { name: "مشاهدات / Views", packages: ["مجانًا (حد أقصى 400) | Free (Max 400)"] }
            }
        };

        function updateServices() {
            const platform = document.getElementById("platform").value;
            const serviceSelect = document.getElementById("service");
            serviceSelect.innerHTML = '<option value="" disabled selected>اختر الخدمة / Choose Service</option>';
            
            if (services[platform]) {
                for (const [key, val] of Object.entries(services[platform])) {
                    serviceSelect.innerHTML += `<option value="${key}">${val.name}</option>`;
                }
            }
            updatePackages();
        }

        function updatePackages() {
            const platform = document.getElementById("platform").value;
            const service = document.getElementById("service").value;
            const packageSelect = document.getElementById("packageSelect");
            packageSelect.innerHTML = '<option value="" disabled selected>اختر الباقة / Choose Package</option>';

            if (platform && service && services[platform][service]) {
                services[platform][service].packages.forEach(pkg => {
                    packageSelect.innerHTML += `<option value="${pkg}">${pkg}</option>`;
                });
            }
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById("alertBox");
            alertBox.textContent = msg; alertBox.className = `alert-msg alert-${type}`;
            alertBox.style.display = "block"; setTimeout(() => { alertBox.style.display = "none"; }, 8000);
        }

        // دالة التحكم بوقت الانتظار (6 ساعات)
        function startCooldown(lastOrderTimestamp) {
            if (isVPNDetected) return; // لا تفعل شيء إذا كان VPN مفعل

            const btn = document.getElementById("submitBtn");
            const sixHoursMs = 6 * 60 * 60 * 1000; // 6 ساعات بالملي ثانية
            clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                const now = Date.now();
                const timePassed = now - lastOrderTimestamp;

                if (timePassed < sixHoursMs) {
                    hasGlobalOrder = true;
                    btn.disabled = true;
                    
                    const timeLeft = sixHoursMs - timePassed;
                    const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                    btn.innerHTML = `<i class="fas fa-lock"></i> يفتح بعد: ${hours}س و ${minutes}د و ${seconds}ث`;
                } else {
                    // انقضت الـ 6 ساعات
                    hasGlobalOrder = false;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب / Submit Request';
                    clearInterval(countdownTimer);
                }
            }, 1000);
        }

        // جلب طلبات المستخدم وفحص الوقت
        function loadMyOrders() {
            if(!sanitizedIP) return;
            db.ref('senpa_orders/' + sanitizedIP).on('value', snap => {
                const ordersList = document.getElementById('ordersList');
                ordersList.innerHTML = "";
                const data = snap.val();
                
                if (!data) {
                    ordersList.innerHTML = "<p style='text-align:center; color: var(--text-muted);'>لا توجد طلبات سابقة.</p>";
                    
                    // التحقق من المتصفح في حال مسح قاعدة البيانات وبقى المتصفح
                    const localTimestamp = parseInt(localStorage.getItem("remas_last_order_time"));
                    if(localTimestamp) startCooldown(localTimestamp);
                    else hasGlobalOrder = false;

                    return;
                }

                // عرض الطلبات واستخراج أحدث وقت طلب
                const orderKeys = Object.keys(data).reverse();
                let latestTimestamp = parseInt(localStorage.getItem("remas_last_order_time")) || 0;

                orderKeys.forEach(key => {
                    const order = data[key];
                    if (order.timestamp && order.timestamp > latestTimestamp) {
                        latestTimestamp = order.timestamp;
                    }

                    let statusHtml = '';
                    let detailsMsg = '';

                    if(order.status === "completed") {
                        statusHtml = `<span class="status-badge status-success"><i class="fas fa-check-circle"></i> تم التنفيذ</span>`;
                        detailsMsg = '<p style="color:var(--success); margin-top:10px;"><i class="fas fa-bullhorn"></i> تم إيصال طلبك بنجاح!</p>';
                    } else if(order.status === "rejected") {
                        statusHtml = `<span class="status-badge status-rejected"><i class="fas fa-times-circle"></i> مرفوض</span>`;
                        detailsMsg = '<p style="color:var(--rejected); margin-top:10px;"><i class="fas fa-exclamation-triangle"></i> تم رفض الطلب من قبل الإدارة.</p>';
                    } else {
                        statusHtml = `<span class="status-badge status-pending"><i class="fas fa-clock"></i> قيد الانتظار</span>`;
                        detailsMsg = '<p style="color:var(--pending); margin-top:10px;"><i class="fas fa-hourglass-half"></i> طلبك قيد المراجعة والتنفيذ...</p>';
                    }

                    const card = document.createElement('div');
                    card.className = "order-card";
                    card.onclick = function() { this.classList.toggle('open'); };
                    card.innerHTML = `
                        <div class="order-header">
                            <strong>${order.platform} - ${order.serviceName}</strong>
                            ${statusHtml}
                        </div>
                        <div class="order-details">
                            <p><strong>📦 الباقة:</strong> ${order.packageInfo}</p>
                            <p><strong>🔗 الرابط:</strong> ${order.target}</p>
                            <p><strong>🕒 الوقت:</strong> ${order.time}</p>
                            ${detailsMsg}
                        </div>
                    `;
                    ordersList.appendChild(card);
                });

                // تفعيل عداد الـ 6 ساعات
                if (latestTimestamp > 0) {
                    startCooldown(latestTimestamp);
                }
            });
        }

        // إرسال الطلب
        document.getElementById("boostForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            // تحقق نهائي من الـ VPN 
            if (isVPNDetected) {
                showAlert("لا يمكنك الطلب أثناء استخدام VPN.", "error");
                return;
            }

            if (hasGlobalOrder) {
                showAlert("عذراً! لا يزال هناك وقت متبقٍ قبل أن تتمكن من طلب رشق جديد.", "error");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

            const platform = document.getElementById("platform").value;
            const serviceKey = document.getElementById("service").value;
            const serviceName = document.getElementById("service").options[document.getElementById("service").selectedIndex].text;
            const packageInfo = document.getElementById("packageSelect").value;
            const targetLink = document.getElementById("targetLink").value.trim();
            const isPaid = packageInfo.includes("مدفوع") || packageInfo.includes("Paid");

            const currentTimestamp = Date.now();

            // حفظ الطلب في Firebase
            const newOrderRef = db.ref('senpa_orders/' + sanitizedIP).push();
            const orderData = {
                platform: platform,
                serviceName: serviceName,
                packageInfo: packageInfo,
                target: targetLink,
                status: "pending", 
                time: new Date().toLocaleString('en-US', { hour12: true }),
                timestamp: currentTimestamp // حفظ الوقت الدقيق بالملي ثانية
            };

            await newOrderRef.set(orderData);

            // إرسال إشعار تليجرام للأدمن
            const message = `
🚀 *طلب رشق جديد* 🚀

📱 *المنصة:* ${platform}
⚙️ *الخدمة:* ${serviceName}
📦 *الباقة:* ${packageInfo}
🔗 *الرابط:* \`${targetLink}\`
🌐 *ايبى العميل:* \`${userIP}\`

${isPaid ? '💰 **طلب مدفوع! تواصل مع العميل**' : '🎁 **طلب مجاني**'}
💡 *توجّه إلى لوحة الإدارة (Admin Panel) لتغيير حالة الطلب!*
            `;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            }).then(() => {
                // حفظ بصمة الوقت في المتصفح
                localStorage.setItem("remas_last_order_time", currentTimestamp);
                
                showAlert("تم إرسال طلبك بنجاح! תابعه في الأسفل ✅. (يمكنك الطلب مجدداً بعد 6 ساعات)", "success");
                document.getElementById("targetLink").value = "";
                
                // تشغيل العد التنازلي فوراً بعد الإرسال
                startCooldown(currentTimestamp);

            }).catch(() => {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب';
            });
        });
    </script>
</body>
</html>
