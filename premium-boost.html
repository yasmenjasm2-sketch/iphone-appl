<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرشق بريميوم - Premium Boost | Remas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #ffd700; /* اللون الذهبي */
            --bg-main: #050b14;
            --bg-grad-1: #1a1025;
            --bg-grad-2: #090a0f;
            --card-bg: rgba(20, 25, 40, 0.8);
            --glass-border: rgba(255, 215, 0, 0.3);
            --text-main: #f8fafc;
            --neon-glow: 0 0 15px rgba(255, 215, 0, 0.4);
            --input-bg: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; }

        body {
            background: radial-gradient(circle at top right, var(--bg-grad-1), var(--bg-grad-2), var(--bg-main));
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; gap: 20px;
        }

        .container {
            width: 100%; max-width: 550px; padding: 30px; background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), var(--neon-glow);
        }

        /* ستايل الشعار */
        .site-logo {
            width: 110px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 25px;
            box-shadow: var(--neon-glow);
            border: 2px solid var(--primary);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .site-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }

        .header-title { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .header-title h2 { color: var(--primary); font-size: 24px; text-shadow: var(--neon-glow); }
        .header-title p { color: #aaa; font-size: 14px; margin-top: 5px; }

        .wallet-box {
            background: rgba(255, 215, 0, 0.05); border: 1px solid var(--primary); border-radius: 12px;
            padding: 20px; text-align: center; margin-bottom: 20px; position: relative;
        }
        .wallet-box h3 { color: var(--primary); margin: 10px 0; font-size: 28px; text-shadow: var(--neon-glow); }
        
        .user-id-box {
            font-size: 14px; color: #ccc; margin-top: 15px; background: rgba(0,0,0,0.5); 
            padding: 10px 15px; border-radius: 8px; display: inline-flex; align-items: center; gap: 10px; border: 1px solid rgba(255,215,0,0.2);
            font-family: 'Courier New', Courier, monospace; letter-spacing: 2px;
        }
        .user-id-box strong { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .copy-btn { cursor: pointer; color: var(--primary); font-size: 18px; }
        .copy-btn:hover { transform: scale(1.2); text-shadow: var(--neon-glow); }

        .btn-buy-balance {
            display: inline-flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 15px; padding: 10px 20px; width: 100%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; text-decoration: none; border-radius: 10px; font-size: 15px; font-weight: bold;
        }
        .btn-buy-balance:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(220, 39, 67, 0.4); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary); }
        
        select, input {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--input-bg); color: var(--text-main); font-size: 15px; outline: none; direction: ltr; text-align: right;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }
        select option { background: var(--bg-main); color: var(--text-main); }
        input::placeholder { text-align: right; }

        .price-display {
            text-align: center; font-size: 20px; font-weight: bold; color: #10b981; margin: 15px 0; display: none;
        }

        .btn-pay {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px;
            background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-pay:hover { box-shadow: var(--neon-glow); transform: translateY(-3px); }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back-btn { display: inline-block; margin-top: 20px; color: white; text-decoration: none; text-align: center; width: 100%; }
        .back-btn:hover { color: var(--primary); }

        .alert-msg { display: none; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .alert-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">
            <img src="logo.jpg" alt="Remas Logo" class="site-logo">
            <h2><i class="fas fa-crown"></i> الرشق بريميوم</h2>
            <p>خدمات مدفوعة موثوقة وسريعة التنفيذ</p>
        </div>

        <div class="wallet-box">
            <p>الرصيد المتاح</p>
            <h3 id="userBalance"><i class="fas fa-spinner fa-spin"></i></h3>
            
            <div class="user-id-box">
                <i class="fas fa-credit-card"></i>
                <span id="accountIdDisplay">جاري إنشاء البطاقة...</span>
                <i class="fas fa-copy copy-btn" onclick="copyId()" title="نسخ رقم البطاقة"></i>
            </div>

            <a href="https://www.instagram.com/6i99n?igsh=OHk4aDhtNDlyanA0" target="_blank" class="btn-buy-balance">
                <i class="fab fa-instagram"></i> تواصل لشراء رصيد
            </a>
        </div>

        <div id="alertBox" class="alert-msg"></div>

        <form id="premiumForm">
            <div class="form-group">
                <label><i class="fas fa-share-alt"></i> المنصة</label>
                <select id="platform" required onchange="updateServices()">
                    <option value="" disabled selected>اختر المنصة</option>
                    <option value="Instagram">Instagram - انستغرام</option>
                    <option value="TikTok">TikTok - تيك توك</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-list"></i> الخدمة المطلوبة</label>
                <select id="service" required onchange="updatePackages()">
                    <option value="" disabled selected>اختر الخدمة أولاً</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-gem"></i> الباقة والسعر</label>
                <select id="packageSelect" required onchange="showPrice()">
                    <option value="" disabled selected>اختر الباقة</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-link"></i> الرابط أو المعرف</label>
                <input type="url" id="targetLink" required placeholder="ضع الرابط الصحيح هنا">
            </div>

            <div class="price-display" id="priceDisplay">الإجمالي: 0.00$</div>

            <button type="submit" class="btn-pay" id="submitBtn">
                <i class="fas fa-coins"></i> تقديم الطلب وخصم الرصيد
            </button>
        </form>

        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <script>
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userCardNumber = "";
        let currentBalance = 0;
        let selectedPrice = 0;
        let isVPNDetected = false;

        // جلب الـ IP وفحص الـ VPN المخادع
        fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
            // خوارزمية كشف الـ VPN البسيطة
            const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const isp = (data.org || "").toLowerCase();
            const suspiciousWords = ['hosting', 'cloud', 'datacenter', 'vpn', 'proxy', 'tor', 'digitalocean', 'aws', 'amazon', 'google', 'linode', 'ovh'];
            
            // الفحص الأول: اختلاف الوقت بين المتصفح وسيرفر الـ IP
            if (data.timezone && browserTz !== data.timezone) {
                isVPNDetected = true;
            }
            // الفحص الثاني: مزود الخدمة ينتمي لسيرفرات سحابية
            if (suspiciousWords.some(word => isp.includes(word))) {
                isVPNDetected = true;
            }

            if(isVPNDetected) {
                showAlert("⚠️ تم اكتشاف استخدام (VPN/Proxy). يُرجى إيقافه وإعادة تحميل الصفحة لتتمكن من الطلب.", "error");
                const btn = document.getElementById("submitBtn");
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-ban"></i> غير مسموح بالـ VPN';
            }
        }).catch(err => {
            console.error("فشل في جلب البيانات.");
        });

        // خوارزمية احترافية لتوليد بطاقة بنكية فريدة (16 رقم)
        function generateUniqueBankCard() {
            let card = "4"; // تبدأ بـ 4 مثل فيزا
            for(let i=0; i<15; i++) {
                card += Math.floor(Math.random() * 10).toString();
            }
            return card.match(/.{1,4}/g).join('-'); // تقسيمها لـ 4 أجزاء
        }

        // تهيئة حساب المستخدم وبطاقته
        function initUserCard() {
            let savedCard = localStorage.getItem('remas_bank_card');
            
            if (!savedCard) {
                savedCard = generateUniqueBankCard();
                localStorage.setItem('remas_bank_card', savedCard);
                // تسجيل البطاقة في قاعدة البيانات برصيد 0 افتراضي
                db.ref('senpa_points/' + savedCard).set({ balance: 0, createdAt: new Date().toISOString() });
            }
            
            userCardNumber = savedCard;
            document.getElementById('accountIdDisplay').innerHTML = `<strong>${userCardNumber}</strong>`;
            loadBalance(userCardNumber);
        }

        // تشغيل نظام البطاقة فوراً
        initUserCard();

        function loadBalance(cardId) {
            db.ref('senpa_points/' + cardId).on('value', snap => {
                currentBalance = snap.val() && snap.val().balance ? parseFloat(snap.val().balance) : 0;
                document.getElementById('userBalance').innerHTML = `${currentBalance.toFixed(2)} $`;
            });
        }

        function copyId() {
            if(!userCardNumber) return;
            navigator.clipboard.writeText(userCardNumber).then(() => {
                showAlert("تم نسخ رقم بطاقتك بنجاح! أرسله للإدارة عند طلب تعبئة الرصيد.", "success");
            });
        }

        const premiumServices = {
            "Instagram": {
                "ig_followers": { name: "متابعين انستغرام", packages: [{ text: "10K متابع - 39.99$", price: 39.99 }, { text: "5K متابع - 25.99$", price: 25.99 }, { text: "1000 متابع - 11.99$", price: 11.99 }] },
                "ig_likes": { name: "إعجابات انستغرام", packages: [{ text: "1000 لايك (+500 مجاناً) - 5.99$", price: 5.99 }] },
                "ig_views": { name: "مشاهدات انستغرام", packages: [{ text: "2500 مشاهدة - 4.99$", price: 4.99 }, { text: "1350 مشاهدة - 2.99$", price: 2.99 }] }
            },
            "TikTok": {
                "tk_followers": { name: "متابعون تيك توك", packages: [{ text: "10K متابع - 44.99$", price: 44.99 }, { text: "5K متابع - 23.99$", price: 23.99 }, { text: "1000 متابع - 12.99$", price: 12.99 }] },
                "tk_likes": { name: "إعجابات تيك توك", packages: [{ text: "2000 لايك - 17.99$", price: 17.99 }, { text: "1100 لايك - 8.99$", price: 8.99 }, { text: "700 لايك - 4.99$", price: 4.99 }] },
                "tk_views": { name: "مشاهدات تيك توك", packages: [{ text: "2500 مشاهدة (+870 مجاناً) - 3.99$", price: 3.99 }] }
            }
        };

        function updateServices() {
            const platform = document.getElementById("platform").value;
            const serviceSelect = document.getElementById("service");
            serviceSelect.innerHTML = '<option value="" disabled selected>اختر الخدمة</option>';
            document.getElementById("packageSelect").innerHTML = '<option value="" disabled selected>اختر الباقة</option>';
            document.getElementById("priceDisplay").style.display = "none";
            selectedPrice = 0;
            if (premiumServices[platform]) {
                for (const [key, val] of Object.entries(premiumServices[platform])) {
                    serviceSelect.innerHTML += `<option value="${key}">${val.name}</option>`;
                }
            }
        }

        function updatePackages() {
            const platform = document.getElementById("platform").value;
            const service = document.getElementById("service").value;
            const packageSelect = document.getElementById("packageSelect");
            packageSelect.innerHTML = '<option value="" disabled selected>اختر الباقة</option>';
            document.getElementById("priceDisplay").style.display = "none";
            selectedPrice = 0;
            if (platform && service && premiumServices[platform][service]) {
                premiumServices[platform][service].packages.forEach((pkg, index) => {
                    packageSelect.innerHTML += `<option value="${index}" data-price="${pkg.price}">${pkg.text}</option>`;
                });
            }
        }

        function showPrice() {
            const packageSelect = document.getElementById("packageSelect");
            const option = packageSelect.options[packageSelect.selectedIndex];
            selectedPrice = parseFloat(option.getAttribute("data-price"));
            const display = document.getElementById("priceDisplay");
            display.innerText = `المطلوب خصمه: ${selectedPrice}$`;
            display.style.display = "block";
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById("alertBox");
            alertBox.textContent = msg; alertBox.className = `alert-msg alert-${type}`;
            alertBox.style.display = "block"; setTimeout(() => { alertBox.style.display = "none"; }, 6000);
        }

        function isValidUrlForPlatform(url, platform) {
            try {
                const urlObj = new URL(url);
                const host = urlObj.hostname.toLowerCase();
                if (platform === "Instagram") return host.includes("instagram.com");
                else if (platform === "TikTok") return host.includes("tiktok.com");
                return false;
            } catch (e) { return false; }
        }

        document.getElementById("premiumForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            // تحقق نهائي من الـ VPN 
            if (isVPNDetected) {
                showAlert("لا يمكنك الطلب أثناء استخدام VPN.", "error");
                return;
            }

            if (selectedPrice === 0 || !userCardNumber) return;

            const platform = document.getElementById("platform").value;
            const targetLink = document.getElementById("targetLink").value.trim();

            if (!isValidUrlForPlatform(targetLink, platform)) {
                showAlert(`عذراً! الرابط المدخل غير صالح. يرجى إدخال رابط ${platform} صحيح.`, "error");
                return;
            }

            if (currentBalance < selectedPrice) {
                showAlert("رصيدك الحالي غير كافٍ! يرجى التواصل مع الإدارة لتعبئة بطاقتك.", "error");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الخصم والتنفيذ...';

            const serviceName = document.getElementById("service").options[document.getElementById("service").selectedIndex].text;
            const packageInfo = document.getElementById("packageSelect").options[document.getElementById("packageSelect").selectedIndex].text;

            // خصم الرصيد
            const newBalance = currentBalance - selectedPrice;
            await db.ref('senpa_points/' + userCardNumber).update({ balance: newBalance });

            // حفظ الطلب باستخدام رقم البطاقة
            const newOrderRef = db.ref('senpa_orders/' + userCardNumber).push();
            await newOrderRef.set({
                platform: platform, serviceName: serviceName, packageInfo: packageInfo,
                target: targetLink, status: "pending", time: new Date().toLocaleString('en-US', { hour12: true }),
                type: "premium", price: selectedPrice
            });

            // إرسال إشعار تليجرام
            const message = `
👑 *طلب رشق بريميوم جديد* 👑

📱 *المنصة:* ${platform}
⚙️ *الخدمة:* ${serviceName}
📦 *الباقة:* ${packageInfo}
💵 *المبلغ المخصوم:* ${selectedPrice}$
🔗 *الرابط:* \`${targetLink}\`
💳 *بطاقة العميل:* \`${userCardNumber}\`
`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            }).then(() => {
                showAlert("تم استلام طلبك وخصم الرصيد بنجاح! جاري التنفيذ.", "success");
                document.getElementById("premiumForm").reset();
                document.getElementById("priceDisplay").style.display = "none";
            }).finally(() => {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-coins"></i> تقديم الطلب وخصم الرصيد';
            });
        });
    </script>
</body>
</html>
