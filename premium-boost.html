<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرشق بريميوم - Premium Boost | Remas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #ffd700; /* اللون الذهبي */
            --bg-main: #050b14;
            --bg-grad-1: #1a1025;
            --bg-grad-2: #090a0f;
            --card-bg: rgba(20, 25, 40, 0.8);
            --glass-border: rgba(255, 215, 0, 0.3);
            --text-main: #f8fafc;
            --neon-glow: 0 0 15px rgba(255, 215, 0, 0.4);
            --input-bg: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; }

        body {
            background: radial-gradient(circle at top right, var(--bg-grad-1), var(--bg-grad-2), var(--bg-main));
            color: var(--text-main); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; gap: 20px;
        }

        .container {
            width: 100%; max-width: 550px; padding: 30px; background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), var(--neon-glow);
        }

        .header-title { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .header-title h2 { color: var(--primary); font-size: 24px; text-shadow: var(--neon-glow); }
        .header-title p { color: #aaa; font-size: 14px; margin-top: 5px; }

        .wallet-box {
            background: rgba(255, 215, 0, 0.1); border: 1px solid var(--primary); border-radius: 12px;
            padding: 15px; text-align: center; margin-bottom: 20px;
        }
        .wallet-box h3 { color: var(--primary); margin: 0; font-size: 22px; }
        .wallet-box p { margin: 5px 0 0; font-size: 12px; color: #ccc; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary); }
        
        select, input {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--input-bg); color: var(--text-main); font-size: 15px; outline: none;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }
        select option { background: var(--bg-main); color: var(--text-main); }

        .price-display {
            text-align: center; font-size: 20px; font-weight: bold; color: #10b981; margin: 15px 0; display: none;
        }

        .btn-pay {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px;
            background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-pay:hover { box-shadow: var(--neon-glow); transform: translateY(-3px); }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back-btn { display: inline-block; margin-top: 20px; color: white; text-decoration: none; text-align: center; width: 100%; }
        .back-btn:hover { color: var(--primary); }

        .alert-msg { display: none; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .alert-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">
            <h2><i class="fas fa-crown"></i> الرشق بريميوم</h2>
            <p>خدمات مدفوعة موثوقة وسريعة التنفيذ</p>
        </div>

        <div class="wallet-box">
            <p>رصيدك الحالي (النقاط)</p>
            <h3 id="userBalance"><i class="fas fa-spinner fa-spin"></i></h3>
            <p style="font-size: 10px;">(يتم شحن الرصيد من قبل الإدارة عبر الـ IP الخاص بك)</p>
            <p style="font-size: 11px; color: #888;" id="userIpDisplay"></p>
        </div>

        <div id="alertBox" class="alert-msg"></div>

        <form id="premiumForm">
            <div class="form-group">
                <label><i class="fas fa-share-alt"></i> المنصة</label>
                <select id="platform" required onchange="updateServices()">
                    <option value="" disabled selected>اختر المنصة</option>
                    <option value="Instagram">Instagram - انستغرام</option>
                    <option value="TikTok">TikTok - تيك توك</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-list"></i> الخدمة المطلوبة</label>
                <select id="service" required onchange="updatePackages()">
                    <option value="" disabled selected>اختر الخدمة أولاً</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-gem"></i> الباقة والسعر</label>
                <select id="packageSelect" required onchange="showPrice()">
                    <option value="" disabled selected>اختر الباقة</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-link"></i> الرابط أو المعرف</label>
                <input type="text" id="targetLink" required placeholder="ضع الرابط هنا">
            </div>

            <div class="price-display" id="priceDisplay">الإجمالي: 0.00$</div>

            <button type="submit" class="btn-pay" id="submitBtn">
                <i class="fas fa-coins"></i> دفع وتقديم الطلب
            </button>
        </form>

        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <script>
        const BOT_TOKEN = "7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg";
        const CHAT_ID = "-1003783270855";

        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userIP = "";
        let sanitizedIP = "";
        let currentBalance = 0;
        let selectedPrice = 0;

        // المنتجات المطلوبة فقط
        const premiumServices = {
            "Instagram": {
                "ig_followers": {
                    name: "متابعين انستغرام",
                    packages: [
                        { text: "10K متابع - 39.99$", price: 39.99 },
                        { text: "5K متابع - 25.99$", price: 25.99 },
                        { text: "1000 متابع - 11.99$", price: 11.99 }
                    ]
                },
                "ig_likes": {
                    name: "إعجابات انستغرام",
                    packages: [
                        { text: "1000 لايك (+500 مجاناً) - 5.99$", price: 5.99 }
                    ]
                },
                "ig_views": {
                    name: "مشاهدات انستغرام",
                    packages: [
                        { text: "2500 مشاهدة - 4.99$", price: 4.99 },
                        { text: "1350 مشاهدة - 2.99$", price: 2.99 }
                    ]
                }
            },
            "TikTok": {
                "tk_followers": {
                    name: "متابعون تيك توك",
                    packages: [
                        { text: "10K متابع - 44.99$", price: 44.99 },
                        { text: "5K متابع - 23.99$", price: 23.99 },
                        { text: "1000 متابع - 12.99$", price: 12.99 }
                    ]
                },
                "tk_likes": {
                    name: "إعجابات تيك توك",
                    packages: [
                        { text: "2000 لايك - 17.99$", price: 17.99 },
                        { text: "1100 لايك - 8.99$", price: 8.99 },
                        { text: "700 لايك - 4.99$", price: 4.99 }
                    ]
                },
                "tk_views": {
                    name: "مشاهدات تيك توك",
                    packages: [
                        { text: "2500 مشاهدة (+870 مجاناً) - 3.99$", price: 3.99 }
                    ]
                }
            }
        };

        // جلب الـ IP ورصيد النقاط
        fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
            userIP = data.ip;
            sanitizedIP = userIP.replace(/\./g, '_');
            document.getElementById('userIpDisplay').innerText = `IP: ${userIP}`;
            loadBalance();
        }).catch(err => {
            document.getElementById('userBalance').innerText = "خطأ في الاتصال";
        });

        function loadBalance() {
            db.ref('senpa_points/' + sanitizedIP).on('value', snap => {
                currentBalance = snap.val() ? parseFloat(snap.val().balance) : 0;
                document.getElementById('userBalance').innerHTML = `${currentBalance.toFixed(2)} $`;
            });
        }

        function updateServices() {
            const platform = document.getElementById("platform").value;
            const serviceSelect = document.getElementById("service");
            serviceSelect.innerHTML = '<option value="" disabled selected>اختر الخدمة</option>';
            document.getElementById("packageSelect").innerHTML = '<option value="" disabled selected>اختر الباقة</option>';
            document.getElementById("priceDisplay").style.display = "none";
            selectedPrice = 0;
            
            if (premiumServices[platform]) {
                for (const [key, val] of Object.entries(premiumServices[platform])) {
                    serviceSelect.innerHTML += `<option value="${key}">${val.name}</option>`;
                }
            }
        }

        function updatePackages() {
            const platform = document.getElementById("platform").value;
            const service = document.getElementById("service").value;
            const packageSelect = document.getElementById("packageSelect");
            packageSelect.innerHTML = '<option value="" disabled selected>اختر الباقة</option>';
            document.getElementById("priceDisplay").style.display = "none";
            selectedPrice = 0;

            if (platform && service && premiumServices[platform][service]) {
                premiumServices[platform][service].packages.forEach((pkg, index) => {
                    packageSelect.innerHTML += `<option value="${index}" data-price="${pkg.price}">${pkg.text}</option>`;
                });
            }
        }

        function showPrice() {
            const packageSelect = document.getElementById("packageSelect");
            const option = packageSelect.options[packageSelect.selectedIndex];
            selectedPrice = parseFloat(option.getAttribute("data-price"));
            const display = document.getElementById("priceDisplay");
            display.innerText = `المطلوب خصمه: ${selectedPrice}$`;
            display.style.display = "block";
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById("alertBox");
            alertBox.textContent = msg; alertBox.className = `alert-msg alert-${type}`;
            alertBox.style.display = "block"; setTimeout(() => { alertBox.style.display = "none"; }, 5000);
        }

        // معالجة الدفع والطلب
        document.getElementById("premiumForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            if (selectedPrice === 0) return;

            const btn = document.getElementById("submitBtn");
            
            if (currentBalance < selectedPrice) {
                showAlert("عذراً! رصيد نقاطك غير كافٍ لإتمام هذه العملية.", "error");
                return;
            }

            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدفع...';

            // خصم الرصيد
            const newBalance = currentBalance - selectedPrice;
            await db.ref('senpa_points/' + sanitizedIP).update({ balance: newBalance });

            const platform = document.getElementById("platform").value;
            const serviceName = document.getElementById("service").options[document.getElementById("service").selectedIndex].text;
            const packageInfo = document.getElementById("packageSelect").options[document.getElementById("packageSelect").selectedIndex].text;
            const targetLink = document.getElementById("targetLink").value.trim();

            // حفظ الطلب
            const newOrderRef = db.ref('senpa_orders/' + sanitizedIP).push();
            await newOrderRef.set({
                platform: platform, serviceName: serviceName, packageInfo: packageInfo,
                target: targetLink, status: "pending", time: new Date().toLocaleString('en-US', { hour12: true }),
                type: "premium", price: selectedPrice
            });

            // إرسال إشعار تليجرام
            const message = `
👑 *طلب رشق بريميوم جديد* 👑

📱 *المنصة:* ${platform}
⚙️ *الخدمة:* ${serviceName}
📦 *الباقة:* ${packageInfo}
💵 *المبلغ المخصوم:* ${selectedPrice}$
🔗 *الرابط:* \`${targetLink}\`
🌐 *ايبى العميل:* \`${userIP}\`
`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            }).then(() => {
                showAlert("تم الدفع وتقديم الطلب بنجاح! شكراً لك.", "success");
                document.getElementById("premiumForm").reset();
                document.getElementById("priceDisplay").style.display = "none";
            }).finally(() => {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-coins"></i> دفع وتقديم الطلب';
            });
        });
    </script>
</body>
</html>
