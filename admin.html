<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - Remas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #f200ff;
            --bg-dark: #090a0f;
            --card-bg: rgba(20, 25, 40, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --neon-glow: 0 0 15px rgba(242, 0, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: radial-gradient(circle at top right, #251021, var(--bg-dark), #140510);
            color: var(--text-light); padding: 20px;
            min-height: 100vh;
        }

        /* شاشة تسجيل الدخول */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
        }

        .login-box {
            background: var(--card-bg); border: 1px solid var(--primary);
            padding: 40px; border-radius: 15px; box-shadow: var(--neon-glow);
            text-align: center; width: 90%; max-width: 400px;
        }

        .login-box h2 { color: var(--primary); margin-bottom: 20px; }
        .login-box input { margin-bottom: 20px; text-align: center; font-size: 18px; letter-spacing: 2px; }

        /* إخفاء المحتوى الرئيسي في البداية */
        #main-container {
            display: none;
            max-width: 1000px; margin: 0 auto; grid-template-columns: 1fr; gap: 20px;
        }

        .card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .card h2 { border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 20px; color: var(--primary); text-shadow: var(--neon-glow); }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(242, 0, 255, 0.3); }
        textarea { height: 150px; direction: ltr; text-align: left; font-family: monospace; }

        .btn {
            background: var(--primary); color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover { box-shadow: var(--neon-glow); transform: translateY(-2px); }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--glass-border); padding: 10px; text-align: center; }
        th { background: rgba(242, 0, 255, 0.2); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> لوحة الإدارة</h2>
            <p style="margin-bottom: 15px; color: #aaa;">الرجاء إدخال كلمة المرور للوصول</p>
            <input type="password" id="admin-password" placeholder="••••••••" onkeypress="handleLogin(event)">
            <button class="btn" onclick="checkPassword()"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <p id="login-error" style="color: #ef4444; margin-top: 15px; display: none;">كلمة المرور خاطئة!</p>
        </div>
    </div>

    <div id="main-container">
        <div class="card">
            <h2><i class="fas fa-code"></i> إدارة السكربتات</h2>
            <div class="form-group">
                <label>السكربت المستهدف (إنشاء أو تعديل)</label>
                <select id="script-selector" onchange="loadSelectedScript()">
                    <option value="new">➕ --- إنشاء سكربت جديد --- ➕</option>
                </select>
            </div>
            <div class="form-group">
                <label>اسم السكربت</label>
                <input type="text" id="script-name" placeholder="مثال: Macor senpa.io v2">
            </div>
            <div class="form-group">
                <label>كود السكربت (سيتم ضغطه وتأمينه تلقائياً)</label>
                <textarea id="script-code" placeholder="الصق الكود هنا..."></textarea>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="saveScript()" id="btn-save" style="flex: 2;"><i class="fas fa-save"></i> حفظ ونشر السكربت</button>
                <button class="btn btn-danger" onclick="deleteScript()" id="btn-delete" style="flex: 1; display: none;"><i class="fas fa-trash"></i> حذف السكربت</button>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-bullhorn"></i> إطلاق إعلان منبثق للزوار (5 ثواني)</h2>
            <div class="form-group">
                <label>صورة الإعلان (سيتم ضغطها وتصغيرها تلقائياً)</label>
                <input type="file" id="ad-image" accept="image/*">
            </div>
            <div class="form-group">
                <label>نص الإعلان (اختياري)</label>
                <input type="text" id="ad-text" placeholder="اكتب رسالة الزائر هنا...">
            </div>
            <div class="form-group">
                <label>رابط الإعلان (اختياري)</label>
                <input type="url" id="ad-link" placeholder="https://...">
            </div>
            <button class="btn" onclick="publishAd()" id="btn-ad"><i class="fas fa-broadcast-tower"></i> إطلاق الإعلان الآن</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> سجل الزوار المباشر</h2>
            <div style="overflow-x: auto; max-height: 300px; overflow-y: auto;">
                <table id="visitors-table">
                    <thead>
                        <tr>
                            <th>IP</th>
                            <th>الدولة</th>
                            <th>المدينة</th>
                            <th>الوقت</th>
                        </tr>
                    </thead>
                    <tbody id="visitors-list">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- قسم الحماية لمنع التخطي وأدوات المطورين ---
        document.addEventListener('contextmenu', event => event.preventDefault()); // منع الكليك يمين
        document.onkeydown = function(e) {
            // منع F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if(e.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
               (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        // متغير للتحقق من حالة تسجيل الدخول
        let isAuthenticated = false;

        // التحقق من كلمة المرور
        function checkPassword() {
            const pass = document.getElementById('admin-password').value;
            if(pass === "gmail34567") {
                isAuthenticated = true;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                // تهيئة قاعدة البيانات فقط بعد تسجيل الدخول الناجح
                initApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
                setTimeout(() => { document.getElementById('login-error').style.display = 'none'; }, 2000);
            }
        }

        // دعم الضغط على Enter لتسجيل الدخول
        function handleLogin(e) {
            if(e.key === 'Enter') {
                checkPassword();
            }
        }

        // دالة حماية النصوص لمنع حقن السكربتات الخبيثة (XSS Protection)
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // --- إعدادات Firebase ---
        let db;
        function initApp() {
            if (!isAuthenticated) return; // حماية إضافية
            
            const firebaseConfig = {
                apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
                authDomain: "chatlive-4387e.firebaseapp.com",
                databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
                projectId: "chatlive-4387e",
                storageBucket: "chatlive-4387e.firebasestorage.app",
                messagingSenderId: "722728428486",
                appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
            
            refreshScriptsList();
            loadVisitors();
        }

        // جلب قائمة السكربتات
        function refreshScriptsList() {
            if (!isAuthenticated) return;
            const selector = document.getElementById('script-selector');
            db.ref('senpa_scripts').on('value', snap => {
                const currentValue = selector.value;
                selector.innerHTML = '<option value="new">➕ --- إنشاء سكربت جديد --- ➕</option>';
                snap.forEach(child => {
                    const option = document.createElement('option');
                    option.value = escapeHTML(child.key);
                    option.text = escapeHTML(child.val().title) || "بدون اسم";
                    selector.appendChild(option);
                });
                if([...selector.options].some(o => o.value === currentValue)) {
                    selector.value = currentValue;
                }
            });
        }

        // عند تغيير السكربت المختار
        function loadSelectedScript() {
            if (!isAuthenticated) return;
            const id = document.getElementById('script-selector').value;
            const delBtn = document.getElementById('btn-delete');
            const nameInput = document.getElementById('script-name');
            const codeInput = document.getElementById('script-code');

            if (id === 'new') {
                nameInput.value = '';
                codeInput.value = '';
                delBtn.style.display = 'none';
            } else {
                delBtn.style.display = 'flex';
                codeInput.value = 'جاري التحميل...';
                
                db.ref('senpa_scripts/' + id).once('value').then(snap => {
                    const data = snap.val();
                    nameInput.value = data.title ? data.title : ''; // لا نستخدم escape هنا لكي يراه الأدمن بشكله الطبيعي في مربع النص
                    const decompressed = LZString.decompressFromUTF16(data.content);
                    codeInput.value = decompressed ? decompressed : data.content;
                });
            }
        }

        // حفظ السكربت (مع الحماية من الحقن)
        function saveScript() {
            if (!isAuthenticated) return alert("غير مصرح لك!");
            
            const id = document.getElementById('script-selector').value;
            // استخدام دالة الحماية للأسماء
            const name = escapeHTML(document.getElementById('script-name').value); 
            const code = document.getElementById('script-code').value;
            const btn = document.getElementById('btn-save');

            if (!name || !code) return alert("الرجاء كتابة اسم وكود السكربت!");

            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> جاري الحفظ...";
            
            // ضغط الكود يعتبر حماية إضافية تمنع تنفيذه كنص مباشر في قواعد البيانات
            const compressedCode = LZString.compressToUTF16(code);
            
            const ref = (id === 'new') ? db.ref('senpa_scripts').push() : db.ref('senpa_scripts/' + id);

            ref.set({
                title: name,
                content: compressedCode,
                updatedAt: new Date().toISOString()
            }).then(() => {
                btn.innerHTML = "<i class='fas fa-check'></i> تم الحفظ بنجاح!";
                if (id === 'new') {
                    document.getElementById('script-name').value = '';
                    document.getElementById('script-code').value = '';
                }
                setTimeout(() => btn.innerHTML = "<i class='fas fa-save'></i> حفظ ونشر السكربت", 2000);
            }).catch(err => {
                alert("خطأ: " + err.message);
                btn.innerHTML = "<i class='fas fa-save'></i> حفظ ونشر السكربت";
            });
        }

        // حذف السكربت
        function deleteScript() {
            if (!isAuthenticated) return;
            const id = document.getElementById('script-selector').value;
            if (id === 'new') return;

            if (confirm("هل أنت متأكد من حذف هذا السكربت نهائياً؟ سينتزع من موقع الزوار فوراً.")) {
                db.ref('senpa_scripts/' + id).remove().then(() => {
                    alert("تم الحذف بنجاح!");
                    document.getElementById('script-selector').value = 'new';
                    loadSelectedScript();
                });
            }
        }

        // إطلاق إعلان (مع الحماية من الحقن)
        function publishAd() {
            if (!isAuthenticated) return;
            const fileInput = document.getElementById('ad-image');
            // استخدام دالة الحماية للنصوص والروابط
            const text = escapeHTML(document.getElementById('ad-text').value);
            let link = document.getElementById('ad-link').value;
            
            // فلترة مبدئية للرابط لضمان أنه يبدأ ب http
            if(link && !link.startsWith('http')) {
                link = 'https://' + escapeHTML(link);
            } else {
                link = escapeHTML(link);
            }

            const btn = document.getElementById('btn-ad');

            if(!fileInput.files[0]) return alert("الرجاء اختيار صورة للإعلان!");

            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> جاري تجهيز وإرسال الإعلان...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    db.ref('senpa_ads/current').set({
                        image: compressedBase64,
                        text: text,
                        link: link,
                        timestamp: Date.now()
                    }).then(() => {
                        btn.innerHTML = "<i class='fas fa-check'></i> تم إطلاق الإعلان!";
                        setTimeout(() => btn.innerHTML = "<i class='fas fa-broadcast-tower'></i> إطلاق الإعلان الآن", 2000);
                    });
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // سجل الزوار
        function loadVisitors() {
            if (!isAuthenticated) return;
            db.ref('senpa_visitors').limitToLast(50).on('value', snap => {
                const list = document.getElementById('visitors-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    const tr = document.createElement('tr');
                    // حماية بيانات الزوار عند العرض
                    tr.innerHTML = `
                        <td>${escapeHTML(data.ip) || '-'}</td>
                        <td>${escapeHTML(data.country) || '-'}</td>
                        <td>${escapeHTML(data.city) || '-'}</td>
                        <td>${escapeHTML(data.time) || '-'}</td>
                    `;
                    list.insertBefore(tr, list.firstChild);
                });
            });
        }
    </script>
</body>
</html>
